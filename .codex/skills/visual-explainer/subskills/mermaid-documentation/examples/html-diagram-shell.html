<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mermaid Diagram Shell Example</title>
</head>
<body>
<section class="diagram-shell" data-mermaid-diagram-id="authority-ladder">
  <div class="mermaid-wrap">
	    <div class="zoom-controls">
	      <button type="button" data-action="zoom-in" title="Zoom in">+</button>
	      <button type="button" data-action="zoom-out" title="Zoom out">-</button>
	      <button type="button" data-action="zoom-fit" title="Fit">Fit</button>
	      <span class="zoom-label">Fit</span>
	    </div>
	    <div class="mermaid-viewport">
	      <div class="mermaid mermaid-canvas" data-renderer="mermaid@11.15.0;mermaid-inline-svg-renderer@0.1.0" data-render-source-sha256="example-source-hash">
	        <svg viewBox="0 0 160 60" data-mermaid-rendered="true" data-mermaid-diagram-id="authority-ladder" role="img" aria-label="Example rendered Mermaid diagram">
	          <rect x="8" y="12" width="58" height="30" rx="4"></rect>
	          <path d="M 70 27 L 92 27"></path>
	          <rect x="96" y="12" width="58" height="30" rx="4"></rect>
	        </svg>
	      </div>
	    </div>
	  </div>
  <script type="text/plain" class="diagram-source" data-mermaid-diagram-id="authority-ladder">
flowchart TD
  Source["Registered Markdown Source"] --> Registry["Registry Row"]
  Source --> Html["Tracked HTML Derivative"]
  Registry --> Validator["Bootstrap Validation"]
  Html --> Validator
	  </script>
	</section>
</body>
</html>
