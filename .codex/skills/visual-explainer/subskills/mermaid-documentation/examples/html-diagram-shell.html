<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mermaid Diagram Shell Example</title>
</head>
<body>
<section class="diagram-shell" data-mermaid-diagram-id="authority-ladder">
  <div class="mermaid-wrap">
    <div class="zoom-controls">
      <button type="button" data-action="zoom-in" title="Zoom in">+</button>
      <button type="button" data-action="zoom-out" title="Zoom out">-</button>
      <button type="button" data-action="zoom-fit" title="Fit">Fit</button>
    </div>
    <div class="mermaid-viewport">
      <div class="mermaid mermaid-canvas"></div>
    </div>
  </div>
  <script type="text/plain" class="diagram-source" data-mermaid-diagram-id="authority-ladder">
flowchart TD
  Source["Registered Markdown Source"] --> Registry["Registry Row"]
  Source --> Html["Tracked HTML Derivative"]
  Registry --> Validator["Bootstrap Validation"]
  Html --> Validator
  </script>
</section>

<script type="module">
  import mermaid from "./assets/mermaid.esm.min.mjs";

  mermaid.initialize({
    startOnLoad: false,
    theme: "base",
    securityLevel: "strict"
  });
</script>
</body>
</html>
