<section class="diagram-shell" data-mermaid-diagram-id="{{diagram_id}}">
  <div class="mermaid-wrap">
    <div class="zoom-controls">
      <button type="button" data-action="zoom-in" title="Zoom in">+</button>
      <button type="button" data-action="zoom-out" title="Zoom out">-</button>
      <button type="button" data-action="zoom-fit" title="Fit">Fit</button>
      <button type="button" data-action="zoom-expand" title="Open full size">Open</button>
    </div>
    <div class="mermaid-viewport">
      <div class="mermaid mermaid-canvas" data-renderer="{{renderer}}" data-render-source-sha256="{{source_sha256}}">{{inline_svg}}</div>
    </div>
  </div>
  <script type="text/plain" class="diagram-source" data-mermaid-diagram-id="{{diagram_id}}">
{{mermaid_source}}
  </script>
</section>
